<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>pokeNBA &mdash; GM Simulator</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23ef4444'/%3E%3Cpath d='M2 16h28' stroke='%23000' stroke-width='3'/%3E%3Ccircle cx='16' cy='16' r='4' fill='%23fff' stroke='%23000' stroke-width='2'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/static/styles.css?v=20260525" />
</head>
<body>
  <header class="topbar">
    <div class="brand-cluster">
      <a href="#/" class="brand" aria-label="Home">
        <span class="logo" aria-hidden="true"></span>
        <span class="brand-text">pokeNBA</span>
      </a>
      <button id="phase-action-btn" class="btn btn-pulse hidden" type="button"></button>
    </div>
    <nav class="nav">
      <a href="#/" data-route="dashboard">Dashboard</a>
      <a href="#/standings" data-route="standings">Standings</a>
      <a href="#/schedule" data-route="schedule">Schedule</a>
      <a href="#/leaders" data-route="leaders">Leaders</a>
      <a href="#/free-agents" data-route="free-agents">Free Agents</a>
      <a href="#/badges" data-route="badges">Badges</a>
      <a href="#/playoffs" data-route="playoffs" id="playoffs-tab" class="hidden">Playoffs</a>
      <a href="#/draft" data-route="draft" id="draft-tab" class="hidden">Draft</a>
    </nav>
    <div class="actions">
      <span id="season-pill" class="pill">Season 1</span>
      <span id="phase-pill" class="pill pill-phase">Regular Season</span>
      <button id="sim-primary-btn" class="btn btn-primary" type="button">Sim 1 Day</button>
      <button id="sim-secondary-btn" class="btn btn-ghost" type="button">Sim Week</button>
      <button id="sim-tertiary-btn" class="btn btn-ghost hidden" type="button">Sim Round</button>
      <span class="action-sep" aria-hidden="true"></span>
      <button id="reset-btn" class="btn btn-danger-outline btn-sm" type="button" title="Wipe all data and re-seed a fresh league">Reset</button>
    </div>
  </header>

  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <main id="view" class="view"></main>

  <footer class="footer">
    <span>pokeNBA &middot; FastAPI + vanilla JS &middot; sprites &copy; <a href="https://pokeapi.co" target="_blank" rel="noopener">PokeAPI</a></span>
  </footer>

  <script type="module" src="/static/app.js?v=20260525"></script>
</body>
</html>
